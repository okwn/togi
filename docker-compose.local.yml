version: '3.8'

services:
  postgres:
    container_name: togi-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-togi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-togi_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-togi}
    ports:
      - "${POSTGRES_PORT:-5543}:5432"
    volumes:
      - togi_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-togi}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    container_name: togi-redis
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-togi_dev_password}
    ports:
      - "${REDIS_PORT:-6388}:6379"
    volumes:
      - togi_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-togi_dev_password}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    container_name: togi-api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: runner
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      API_PORT: ${API_PORT:-4310}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-togi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-togi_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-togi}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-togi_dev_password}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    ports:
      - "${API_PORT:-4310}:${API_PORT:-4310}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${API_PORT:-4310}/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    container_name: togi-web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runner
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:${API_PORT:-4310}
      VITE_WS_URL: ws://localhost:${API_PORT:-4310}
    ports:
      - "${WEB_PORT:-4320}:${WEB_PORT:-4320}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${WEB_PORT:-4320}/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    container_name: togi-worker
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
      target: runner
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      WORKER_METRICS_PORT: ${WORKER_METRICS_PORT:-4390}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-togi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-togi_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-togi}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-togi_dev_password}
    ports:
      - "${WORKER_METRICS_PORT:-4390}:${WORKER_METRICS_PORT:-4390}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${WORKER_METRICS_PORT:-4390}/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  togi_postgres_data:
  togi_redis_data: